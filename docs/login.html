<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — TrailForge</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="cursor.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; }
  .auth-box {
    background: var(--card-bg); border-radius: 24px; padding: 3rem; width: 100%; max-width: 420px;
    box-shadow: var(--shadow); position: relative;
  }
  .auth-box h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--dark); margin-bottom: 0.5rem; text-align: center; }
  .auth-box p { color: var(--mid); font-size: 0.9rem; text-align: center; margin-bottom: 2rem; }
  .auth-toggle { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
  .auth-toggle button {
    background: none; border: none; font-size: 0.95rem; font-weight: 700; color: var(--mid);
    cursor: pointer; padding-bottom: 0.3rem; border-bottom: 2px solid transparent; transition: 0.2s;
  }
  .auth-toggle button.active { color: var(--ember); border-color: var(--ember); }

  .auth-form { display: flex; flex-direction: column; gap: 1.2rem; }
  .auth-form.hidden { display: none; }

  .auth-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .auth-group label { font-size: 0.8rem; font-weight: 600; color: var(--mid); text-transform: uppercase; letter-spacing: 0.05em; }
  .auth-group input {
    border: 1.5px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; background: var(--cream); color: var(--dark); transition: 0.2s;
  }
  .auth-group input:focus { border-color: var(--ember); }
  .auth-group input.error { border-color: #d32f2f; background: #fff5f5; }

  .auth-submit {
    background: var(--ember); color: #fff; border: none; border-radius: 100px;
    padding: 1rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 1rem;
  }
  .auth-submit:hover { background: var(--ember-light); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(200,75,17,0.3); }

  .back-home { position: absolute; top: 1.5rem; left: 1.5rem; color: var(--mid); text-decoration: none; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; transition: 0.2s; }
  .back-home:hover { color: var(--ember); }

  /* Quick theme toggle for login page */
  .theme-toggle { position: absolute; top: 1.5rem; right: 1.5rem; }
</style>
</head>
<body>

<a href="index.html" class="back-home">← Back</a>
<button class="theme-toggle" onclick="toggleTheme()" id="theme-icon" title="Toggle Dark Mode" style="background:transparent;border:1px solid var(--border);color:var(--dark);border-radius:50%;width:40px;height:40px;cursor:pointer;">🌙</button>

<div class="auth-box">
  <h2 id="auth-title">Welcome Back</h2>
  <p id="auth-subtitle">Sign in to your account</p>

  <div class="auth-toggle">
    <button class="active" id="btn-login" onclick="switchAuth('login')">Login</button>
    <button id="btn-signup" onclick="switchAuth('signup')">Sign Up</button>
  </div>

  <!-- LOGIN FORM -->
  <div class="auth-form" id="form-login">
    <div class="auth-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@email.com" />
    </div>
    <div class="auth-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="auth-submit" onclick="handleLogin()">Log In</button>
  </div>

  <!-- SIGNUP FORM -->
  <div class="auth-form hidden" id="form-signup">
    <div class="auth-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="John Doe" />
    </div>
    <div class="auth-group">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="you@email.com" />
    </div>
    <div class="auth-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="At least 6 characters" />
    </div>
    <button class="auth-submit" onclick="handleSignup()">Create Account</button>
  </div>
</div>

<script>
// Keep theme toggle logic synced
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark-mode');
    document.getElementById('theme-icon').textContent = '☀️';
  }
});

function switchAuth(mode) {
  const isLogin = mode === 'login';
  document.getElementById('form-login').classList.toggle('hidden', !isLogin);
  document.getElementById('form-signup').classList.toggle('hidden', isLogin);
  document.getElementById('btn-login').classList.toggle('active', isLogin);
  document.getElementById('btn-signup').classList.toggle('active', !isLogin);

  document.getElementById('auth-title').textContent = isLogin ? 'Welcome Back' : 'Join Us';
  document.getElementById('auth-subtitle').textContent = isLogin ? 'Sign in to your account' : 'Create a new account';
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function handleSignup() {
  const name = document.getElementById('signup-name');
  const email = document.getElementById('signup-email');
  const pass = document.getElementById('signup-password');

  name.classList.remove('error'); email.classList.remove('error'); pass.classList.remove('error');

  if (!name.value.trim()) { name.classList.add('error'); showToast('⚠️ Name is required.'); return; }
  if (!validateEmail(email.value)) { email.classList.add('error'); showToast('⚠️ Please enter a valid email.'); return; }
  if (pass.value.length < 6) { pass.classList.add('error'); showToast('⚠️ Password must be at least 6 characters.'); return; }

  let users = JSON.parse(localStorage.getItem('users') || '[]');
  if (users.find(u => u.email === email.value)) {
    email.classList.add('error');
    showToast('⚠️ Email already registered.');
    return;
  }

  const newUser = { name: name.value.trim(), email: email.value };
  users.push({ ...newUser, password: pass.value });
  localStorage.setItem('users', JSON.stringify(users));
  localStorage.setItem('currentUser', JSON.stringify(newUser));

  showToast('🎉 Account created! Redirecting...');
  setTimeout(() => window.location.href = 'index.html', 1500);
}

function handleLogin() {
  const email = document.getElementById('login-email');
  const pass = document.getElementById('login-password');

  email.classList.remove('error'); pass.classList.remove('error');

  if (!validateEmail(email.value)) { email.classList.add('error'); showToast('⚠️ Please enter a valid email.'); return; }
  if (!pass.value) { pass.classList.add('error'); showToast('⚠️ Please enter your password.'); return; }

  let users = JSON.parse(localStorage.getItem('users') || '[]');
  const user = users.find(u => u.email === email.value && u.password === pass.value);

  if (user) {
    localStorage.setItem('currentUser', JSON.stringify({ name: user.name, email: user.email }));
    showToast('✅ Logged in successfully!');
    setTimeout(() => window.location.href = 'index.html', 1000);
  } else {
    email.classList.add('error'); pass.classList.add('error');
    showToast('❌ Invalid email or password.');
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
<script src="cursor.js"></script>
</body>
</html>
